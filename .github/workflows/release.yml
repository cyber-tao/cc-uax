name: release

# Build cc-uax for Windows / Linux / macOS (x86_64 + aarch64) and publish
# a GitHub Release with platform archives on every `v*` tag push.
# Package layout inside each archive:
#   cc-uax-<target>-<version>/
#     cc-uax[.exe]
#     skills/cc-uax/SKILL.md

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets --locked

      - name: Test
        run: cargo test --locked

      - name: Test without default features
        run: cargo test --no-default-features --locked

  build:
    name: Build ${{ matrix.target }}
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          # Both macOS targets cross-compile on an Apple Silicon runner.
          # macos-13 (the last Intel runner) was retired 2025-12-04, so x86_64
          # is built via Apple's universal toolchain (clang/ld target both arches).
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compiler (linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage package
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 '^version =' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          TARGET="${{ matrix.target }}"
          STAGE="cc-uax-${TARGET}-${VERSION}"
          mkdir -p "${STAGE}/skills/cc-uax"
          BIN_NAME="cc-uax"
          case "${TARGET}" in *-pc-windows-*) BIN_NAME="cc-uax.exe" ;; esac
          cp "target/${TARGET}/release/${BIN_NAME}" "${STAGE}/${BIN_NAME}"
          cp skills/cc-uax/SKILL.md "${STAGE}/skills/cc-uax/SKILL.md"
          ARCHIVE="${STAGE}.${{ matrix.archive }}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "${ARCHIVE}" "${STAGE}"
          else
            tar -czf "${ARCHIVE}" "${STAGE}"
          fi
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for changelog generation)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Generate changelog body
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          # git-cliff body is pre-pended; GitHub's auto notes (contributors,
          # full commit list, compare link) are appended after it.
          body: ${{ steps.git-cliff.outputs.content }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: artifacts/*
