name: release

# Build cc-uax for Windows / Linux / macOS (x86_64 + aarch64) and publish
# a GitHub Release with platform archives on every `v*` tag push.
# Package layout inside each archive:
#   cc-uax-<target>-<version>/
#     cc-uax[.exe]
#     LICENSE
#     skills/cc-uax/...

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  check:
    name: Check
    uses: ./.github/workflows/ci.yml

  version:
    name: Validate tag version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Compare tag with package version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(cargo pkgid -p cc-uax-cli | sed -E 's/.*[@#]([^@#]+)$/\1/')
          EXPECTED_TAG="v${VERSION}"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match cc-uax-cli ${VERSION}" >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: [check, version]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          # Both macOS targets cross-compile on an Apple Silicon runner.
          # macos-13 (the last Intel runner) was retired 2025-12-04, so x86_64
          # is built via Apple's universal toolchain (clang/ld target both arches).
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compiler (linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
        run: cargo build -p cc-uax-cli --release --locked --target ${{ matrix.target }}

      - name: Stage package
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(cargo pkgid -p cc-uax-cli | sed -E 's/.*[@#]([^@#]+)$/\1/')
          TARGET="${{ matrix.target }}"
          STAGE="cc-uax-${TARGET}-${VERSION}"
          mkdir -p "${STAGE}/skills/cc-uax"
          BIN_NAME="cc-uax"
          case "${TARGET}" in *-pc-windows-*) BIN_NAME="cc-uax.exe" ;; esac
          cp "target/${TARGET}/release/${BIN_NAME}" "${STAGE}/${BIN_NAME}"
          cp -R skills/cc-uax/. "${STAGE}/skills/cc-uax/"
          cp LICENSE "${STAGE}/LICENSE"
          test -f "${STAGE}/skills/cc-uax/SKILL.md"
          test -f "${STAGE}/LICENSE"
          ARCHIVE="${STAGE}.${{ matrix.archive }}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "${ARCHIVE}" "${STAGE}"
          else
            tar -czf "${ARCHIVE}" "${STAGE}"
          fi
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (full history for changelog generation)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Generate SHA256 checksums
        working-directory: artifacts
        run: sha256sum cc-uax-* > SHA256SUMS

      - name: Generate changelog body
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          # git-cliff body is pre-pended; GitHub's auto notes (contributors,
          # full commit list, compare link) are appended after it.
          body: ${{ steps.git-cliff.outputs.content }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: artifacts/*
