[package]
name = "cc-uax"
version = "0.1.0"
edition = "2024"
description = "A from-scratch Rust reader that parses Unreal Engine 5 Blueprint (.uasset) packages into JSON by mirroring CoreUObject serialization — no third-party uasset crate."
license = "MIT"

[[bin]]
name = "cc-uax"
path = "src/main.rs"

[lib]
name = "cc_uax"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
byteorder = "1"
clap = { version = "4", features = ["derive"] }
rusqlite = { version = "0.38", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = 3
