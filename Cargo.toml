[package]
name = "cc-uax"
version = "0.3.0"
edition = "2024"
rust-version = "1.88"
description = "Parse Unreal Engine 5 .uasset/.umap packages to JSON — header, tagged properties, Blueprint node graph, and forward/reverse asset references."
license = "MIT"

[[bin]]
name = "cc-uax"
path = "src/main.rs"

[lib]
name = "cc_uax"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
byteorder = "1"
clap = { version = "4", features = ["derive"] }
rusqlite = { version = "0.38", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = 3
